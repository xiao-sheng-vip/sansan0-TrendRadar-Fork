name: 强制同步模板（完全覆盖，仅保留指定文件）

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  force-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      workflows: write  # ← 关键：允许修改工作流文件
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: 备份保留的配置文件
        run: |
          mkdir -p /tmp/preserve-backup
          [ -f ".github/workflows/crawler.yml" ] && cp .github/workflows/crawler.yml /tmp/preserve-backup/ && echo "✓ 已备份 crawler.yml"
          [ -f "config/config.yaml" ] && cp config/config.yaml /tmp/preserve-backup/ && echo "✓ 已备份 config.yaml"
          [ -f "config/frequency_words.txt" ] && cp config/frequency_words.txt /tmp/preserve-backup/ && echo "✓ 已备份 frequency_words.txt"
      
      - name: 添加模板远程仓库
        run: |
          git remote add template https://github.com/sansan0/TrendRadar.git
          git fetch template master
      
      - name: 强制同步
        run: |
          git checkout -b chore/force-template-sync
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          git checkout template/master -- .
          mkdir -p .github/workflows config
          [ -f "/tmp/preserve-backup/crawler.yml" ] && cp /tmp/preserve-backup/crawler.yml .github/workflows/ && git add .github/workflows/crawler.yml
          [ -f "/tmp/preserve-backup/config.yaml" ] && cp /tmp/preserve-backup/config.yaml config/ && git add config/config.yaml
          [ -f "/tmp/preserve-backup/frequency_words.txt" ] && cp /tmp/preserve-backup/frequency_words.txt config/ && git add config/frequency_words.txt
      
      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: 强制同步模板更新（保留本地配置）"
      
      - name: 强制推送
        run: |
          git push origin --delete chore/force-template-sync 2>/dev/null || true
          git push origin chore/force-template-sync
      
      - name: 创建 Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/force-template-sync
          title: "chore: 强制同步模板更新"
          body: |
            从 `sansan0/TrendRadar@master` 强制同步
            
            **保留的本地文件：**
            - `.github/workflows/crawler.yml`
            - `config/config.yaml`
            - `config/frequency_words.txt`
          labels: template-sync
