name: 强制同步模板（完全覆盖，仅保留指定文件）

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  force-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0
          # 明确检出默认分支作为基础
          ref: master
      
      - name: 备份保留的配置文件
        run: |
          mkdir -p /tmp/preserve-backup
          [ -f ".github/workflows/crawler.yml" ] && cp .github/workflows/crawler.yml /tmp/preserve-backup/ && echo "✓ 已备份 crawler.yml"
          [ -f "config/config.yaml" ] && cp config/config.yaml /tmp/preserve-backup/ && echo "✓ 已备份 config.yaml"
          [ -f "config/frequency_words.txt" ] && cp config/frequency_words.txt /tmp/preserve-backup/ && echo "✓ 已备份 frequency_words.txt"
      
      - name: 添加模板远程仓库并强制同步
        run: |
          git remote add template https://github.com/sansan0/TrendRadar.git
          git fetch template master
          
          # 创建临时分支进行同步（不切换过去）
          git checkout -b temp-template-sync template/master
          
          # 确保目录存在并恢复保留的文件
          mkdir -p .github/workflows config
          [ -f "/tmp/preserve-backup/crawler.yml" ] && cp /tmp/preserve-backup/crawler.yml .github/workflows/
          [ -f "/tmp/preserve-backup/config.yaml" ] && cp /tmp/preserve-backup/config.yaml config/
          [ -f "/tmp/preserve-backup/frequency_words.txt" ] && cp /tmp/preserve-backup/frequency_words.txt config/
          
          # 提交更改
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: 强制同步模板更新（保留本地配置）
          
          从 sansan0/TrendRadar@master 强制同步
          保留本地文件：
          - .github/workflows/crawler.yml
          - config/config.yaml
          - config/frequency_words.txt"
          
          # 将临时分支合并回 master（保留我们的更改）
          git checkout master
          git merge temp-template-sync --strategy-option theirs
      
      - name: 创建 Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          branch: chore/template-sync-force    # 新分支名（与 base 不同）
          base: master                          # 目标分支
          title: "chore: 强制同步模板更新（完全覆盖模式）"
          body: |
            ⚠️ **此 PR 会覆盖所有本地文件**
            
            从 `sansan0/TrendRadar@master` 强制同步
            
            **保留的本地文件：**
            | 文件 | 说明 |
            |------|------|
            | `.github/workflows/crawler.yml` | ✅ 保留本地版本 |
            | `config/config.yaml` | ✅ 保留本地版本 |
            | `config/frequency_words.txt` | ✅ 保留本地版本 |
            
            **其他文件**：全部从模板仓库更新
          labels: template-sync, force-sync
          delete-branch: true  # PR 合并后删除分支
