name: 同步模板更新

on:
  schedule:
    - cron: "0 0 * * 1"  # 每周一
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 关键：必须添加这行，否则可能报 128 错误
          persist-credentials: false
          fetch-depth: 0

      - name: 同步模板
        uses: AndreasAugustin/actions-template-sync@v2
        with:
          source_repo_path: <sansan0>/<TrendRadar>  # 修改这里！
          upstream_branch: main
          pr_labels: template_sync
          pr_title: "chore: 同步上游模板更新"
          # 明确使用 GITHUB_TOKEN（公开仓库足够）
          source_gh_token: ${{ secrets.GITHUB_TOKEN }}
